version: 2

models:
  - name: stg_order_items
    description: "Cleaned staging model for Olist order items"

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - order_id
              - order_item_id

    columns:
      - name: order_id
        description: "Order identifier"
        tests:
          - not_null
          - relationships:
              arguments:
                to: "{{ ref('stg_orders') }}"
                field: order_id

      - name: order_item_id
        description: "Sequential item number inside the order"
        tests:
          - not_null

      - name: product_id
        description: "Product identifier"
        tests:
          - not_null
          - relationships:
              arguments:
                to: "{{ ref('stg_products') }}"
                field: product_id

      - name: seller_id
        description: "Seller identifier"
        tests:
          - not_null
          - relationships:
              arguments:
                to: "{{ ref('stg_sellers') }}"
                field: seller_id

      - name: shipping_limit_ts
        description: "Shipping deadline timestamp"

      - name: price
        description: "Item price"
        tests:
          - not_null

      - name: freight_value
        description: "Freight amount"
        tests:
          - not_null