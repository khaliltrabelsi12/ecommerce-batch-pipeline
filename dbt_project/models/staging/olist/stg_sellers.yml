version: 2

models:
  - name: stg_sellers
    description: "Cleaned staging model for Olist sellers"

    columns:
      - name: seller_id
        description: "Unique seller identifier"
        tests:
          - not_null
          - unique

      - name: seller_zip_code_prefix
        description: "Seller zip code prefix"

      - name: seller_city
        description: "Seller city"

      - name: seller_state
        description: "Seller state"
        tests:
          - not_null