version: 2

models:
  - name: dim_customers
    description: "Customer dimension enriched with behavioral metrics (orders, LTV, delivery performance)"

    columns:

      - name: customer_unique_id
        description: "Unique business identifier of a customer"
        tests:
          - not_null
          - unique

      - name: customer_id
        description: "Original customer_id from source (not unique)"

      - name: zip_code_prefix
        description: "Customer zip code prefix"

      - name: city
        description: "Customer city"

      - name: state
        description: "Customer state"

      - name: total_orders
        description: "Total number of orders placed by the customer"
        tests:
          - not_null

      - name: lifetime_value
        description: "Total revenue generated by the customer (sum of order values)"
        tests:
          - not_null

      - name: avg_order_value
        description: "Average value per order"
        tests:
          - not_null

      - name: first_order_at
        description: "Timestamp of the first order"

      - name: last_order_at
        description: "Timestamp of the most recent order"

      - name: avg_delivery_delay_days
        description: "Average difference between actual and estimated delivery (in days)"

      - name: customer_type
        description: "Customer segmentation: one_time or repeat"
        tests:
         - not_null
         - accepted_values:
            arguments:
             values: ['one_time', 'repeat']

  - name: dim_products
    description: "Product dimension with descriptive and physical product attributes"

    columns:
      - name: product_id
        description: "Unique product identifier"
        tests:
          - not_null
          - unique

      - name: product_category_name
        description: "Product category name"

      - name: product_weight_g
        description: "Product weight in grams"

      - name: product_length_cm
        description: "Product length in centimeters"

      - name: product_height_cm
        description: "Product height in centimeters"

      - name: product_width_cm
        description: "Product width in centimeters"

      - name: product_volume_cm3
        description: "Derived product volume in cubic centimeters"

      - name: has_complete_dimensions
        description: "Whether the product has all 3 dimensions populated"
        tests:
          - not_null

      - name: has_complete_description
        description: "Whether the product has both name and description lengths populated"
        tests:
          - not_null
  - name: dim_sellers
    description: "Seller dimension with seller geographic attributes"

    columns:
      - name: seller_id
        description: "Unique seller identifier"
        tests:
          - not_null
          - unique

      - name: zip_code_prefix
        description: "Seller zip code prefix"

      - name: city
        description: "Seller city"

      - name: state
        description: "Seller state"